<html ng-app="dictionaryModule" ng-controller="fileController">
<head>
	<title>{{textFile.name}}</title>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<link href="../css/bootstrap.css" rel="stylesheet" type="text/css"/>

	<script src="../js/url-helper.js"></script>
	<script src="../js/jquery-3.1.1.js"></script>
	<script src="../js/bootstrap.js"></script>
	<script src="../js/angular.js"></script>
	<script src="../js/util.js"></script>
	<script src="../js/dictionary-module.js"></script>
	<script src="../js/service/file-system-service.js"></script>
	<script src="../js/file.js"></script>
</head>
<body>
	<div class="container-fluid">
		<div class="row">
			<div class="col-md-3">
				<button class="btn btn-primary" ng-click="openFolder(folderId)">To folder</button>
				<a href="../view/word-groups.html" class="btn btn-primary" target="_blank">Word groups</a>
			</div>
		</div>
		<h3 ng-if="wordStatus == KNOW" class="text-center">Known words of {{textFile.name}}</h3>
		<h3 ng-if="wordStatus == null && wordStatusFrom == null"class="text-center">Indefinite words of {{textFile.name}}</h3>
		<h3 ng-if="wordStatusFrom"class="text-center">Unknown words of {{textFile.name}}</h3>
		<h3 ng-if="wordStatus == EXCLUDED"class="text-center">Excluded words of {{textFile.name}}</h3>
		<div class="row">
			<div class="col-md-4">
				<div class="row">
					<textarea rows="25" class="form-control" ng-model="textFile.value"></textarea>
				</div>
				<div class="row">
					<div ng-include="'fragment/frequency-summary.html'"></div>
				</div>
			</div>
			<div class="col-md-8">
				<div class="row">
					<div ng-if="wordStatus != null || wordStatusFrom != null" class="col-md-3 link">
						<a href="../view/file.html?folderId={{folderId}}&fileId={{fileId}}">Indefinite words</a>
					</div>
					<div ng-if="wordStatus != KNOW" class="col-md-3 link">
						<a href="../view/file.html?folderId={{folderId}}&fileId={{fileId}}&wordStatus={{KNOW}}">Known words</a>
					</div>
					<div ng-if="!wordStatusFrom" class="col-md-3 link">
						<a href="../view/file.html?folderId={{folderId}}&fileId={{fileId}}&wordStatusFrom={{DO_NOT_KNOW}}">Unknown words</a>
					</div>
					<div ng-if="wordStatus != EXCLUDED" class="col-md-3 link">
						<a href="../view/file.html?folderId={{folderId}}&fileId={{fileId}}&wordStatus={{EXCLUDED}}">Excluded words</a>
					</div>
				</div>
				<div ng-include="'fragment/frequency-edit-word-list.html'"></div>
			</div>
		</div>
	</div>
</body>
</html>

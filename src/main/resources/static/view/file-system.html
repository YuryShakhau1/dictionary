<html ng-app="dictionaryModule">
<head>
	<title>Folders</title>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<link href="../css/bootstrap.css" rel="stylesheet" type="text/css"/>
	<script src="../js/url-helper.js" type="text/javascript"></script>
	<script src="../js/jquery-3.1.1.js" type="text/javascript"></script>
	<script src="../js/bootstrap.js" type="text/javascript"></script>
	<script src="../js/angular.js" type="text/javascript"></script>
	<script src="../js/util.js"></script>
	<script src="../js/dictionary-module.js"></script>
	<script src="../js/service/file-system-service.js"></script>
	<script src="../js/file-system.js" type="text/javascript"></script>
</head>
<body ng-controller="folderController">
	<div class="container-fluid">
		<div class="row">
			<div class="col-md-12">
				<div class="form-group">
					<a href="../view/language.html">Languages</a>
					<a href="../view/word-groups.html" class="btn btn-primary" target="_blank">Word groups</a>
				</div>
				<div class="panel panel-default col-md-4">
					<div class="form-group">
						<label for="folderName">New folder name:</label>
						<input class="form-control" id="folderName" type="text" ng-model="newFolder.name"/>
					</div>
					<div class="form-group">
						<button class="btn btn-success" ng-click="addFolder()">Create new folder</button>
					</div>
				</div>
			</div>
		</div>
		<h3 ng-if="wordStatus == KNOW" class="text-center">Known words</h3>
		<h3 ng-if="wordStatus == null && wordStatusFrom == null"class="text-center">Indefinite words</h3>
		<h3 ng-if="wordStatusFrom"class="text-center">Unknown words</h3>
		<div class="row">
			<div class="col-md-4">
				<div class="row">
					<div class="list-group">
						<div class="list-group-item active">
							<label class="btn">Folder {{currentPath}}</label>
							<label class="btn btn-success pull-right">
								Upload file<input class="hide" id="textFileName" name="textFile" type="file" 
								   onchange="angular.element(this).scope().uploadTextFile(this)"/>
							</label>
						</div>
						<div ng-show="folderId" class="list-group-item">
							<a class="btn btn-link" ng-click="openFolder(parentFolderId)">Back</a>
						</div>
						<div class="list-group-item" ng-repeat="folder in folders | orderBy:'name'">
							<span class="btn" ng-click="openFolder(folder.id)">{{folder.name}}</span>
							<span class="pull-right">
								<button class="btn btn-danger" ng-click="deleteFolder(folder.id)">Delete folder</button>
							</span>
						</div>
						<div class="list-group-item" ng-repeat="textFile in textFiles | orderBy:'name'">
							<div class="row btn" ng-click="openFile(textFile.id)">{{textFile.name}}</div>
							<div class="row list-inline">
								<div class="pull-right">
									<a class="btn btn-primary" href="../fileSystem/file/{{textFile.id}}" download="{{textFile.name}}">Download</a>
									<button class="btn btn-danger" ng-click="deleteTextFile(textFile.id)">Delete file</button>
									<span>&nbsp;&nbsp;&nbsp;&nbsp;</span>
								</div>
							</div>
						</div>
					</div>
				</div>
				<div class="row">
					<div ng-include="'fragment/frequency-summary.html'"></div>
				</div>
			</div>
			<div class="col-md-8">
				<div class="row">
					<div ng-if="wordStatus != null || wordStatusFrom != null" class="col-md-3 link">
						<a href="../view/file-system.html?folderId={{folderId}}&fileId={{fileId}}">Indefinite words</a>
					</div>
					<div ng-if="wordStatus != KNOW" class="col-md-3 link">
						<a href="../view/file-system.html?folderId={{folderId}}&fileId={{fileId}}&wordStatus={{KNOW}}">Known words</a>
					</div>
					<div ng-if="!wordStatusFrom" class="col-md-3 link">
						<a href="../view/file-system.html?folderId={{folderId}}&fileId={{fileId}}&wordStatusFrom={{DO_NOT_KNOW}}">Unknown words</a>
					</div>
					<div ng-if="wordStatus != EXCLUDED" class="col-md-3 link">
						<a href="../view/file-system.html?folderId={{folderId}}&fileId={{fileId}}&wordStatus={{EXCLUDED}}">Excluded words</a>
					</div>
				</div>
				<div ng-include="'fragment/frequency-edit-word-list.html'"></div>
			</div>
		</div>
	</div>
</body>
</html>

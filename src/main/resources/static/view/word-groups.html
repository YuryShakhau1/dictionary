<html ng-app="dictionaryModule" ng-controller="wordGroupsController">
<head>
    <title>{{word.value}}</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <link href="../css/bootstrap.css" rel="stylesheet" type="text/css"/>
    <script src="../js/url-helper.js" type="text/javascript"></script>
    <script src="../js/jquery-3.1.1.js" type="text/javascript"></script>
    <script src="../js/bootstrap.js" type="text/javascript"></script>
    <script src="../js/angular.js" type="text/javascript"></script>
    <script src="../js/util.js"></script>
    <script src="../js/dictionary-module.js"></script>
    <script src="../js/word-groups.js" type="text/javascript"></script>
</head>
<body>
    <h3>Word groups</h3>
    <div class="panel panel-default col-md-4">
        <div class="form-group">
            <label for="folderName">Word group name:</label>
            <input class="form-control" id="folderName" type="text" ng-model="wordGropupName"/>
        </div>
        <div class="form-group">
            <button class="btn btn-success" ng-click="createGroup()">Create group</button>
        </div>
    </div>
    <table class="table">
        <tr ng-repeat="wordGroup in wordGroups">
            <td class="word">
                {{wordGroup.title}}
            </td>
        </tr>
    </table>
</body>
</html>

<html>
<head>
	<link href="./css/bootstrap.css" rel="stylesheet" type="text/css"/>
	<script src="./js/bootstrap.js" type="text/javascript"></script>
	<script src="./js/index.js" type="text/javascript"></script>
	<script type="text/javascript">
		window.location = './view/file-system.html';
	</script>
</head>
<body>
	<div>
		<a href="./view/register.html">Register</a>
	</div>
	<div class="panel panel-default col-md-4">
		<div class="form-group">
			<label>Log in</label>
		</div>
		<div class="form-group">
			<label>Email:</label>
			<input class="form-control" id="email" type="text" ng-model="user.email"/>
		</div>
		<div class="form-group">
			<label>Password:</label>
			<input class="form-control" id="password" type="text" ng-model="user.password"/>
		</div>
		<div class="form-group">
			<button class="btn btn-success" ng-click="logIn()">Log in</button>
		</div>
	</div>
</body>
</html>
